<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>後中醫化學題庫練習</title>
    <meta name="theme-color" content="#1f6f68" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./sync/sync-config.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="題庫練習">
        <header class="topbar">
          <div>
            <p class="eyebrow">後中醫化學</p>
            <h1>題庫練習</h1>
          </div>
          <span id="loadState" class="status-chip">載入中</span>
        </header>

        <section class="filters" aria-label="出題設定">
          <div class="filter-group">
            <span class="filter-label">大學</span>
            <div id="schoolFilters" class="chip-grid" role="group" aria-label="選擇大學"></div>
          </div>
          <div class="filter-group">
            <span class="filter-label">年度</span>
            <div id="yearFilters" class="chip-grid years" role="group" aria-label="選擇年度"></div>
          </div>
          <div class="filter-row">
            <label class="field">
              題目數
              <select id="sessionSize">
                <option value="10">10 題</option>
                <option value="25" selected>25 題</option>
                <option value="50">50 題</option>
                <option value="all">全部</option>
              </select>
            </label>
            <label class="field">
              題型
              <select id="modeFilter">
                <option value="all">全部題目</option>
                <option value="wrong">只練錯題</option>
              </select>
            </label>
            <label class="field search">
              搜尋
              <input id="searchInput" type="search" placeholder="學校、年度、題號、答案來源" />
            </label>
          </div>
          <div class="filter-actions">
            <button id="startBtn" class="primary" type="button">開始出題</button>
            <button id="shuffleBtn" type="button">重新混合</button>
            <button id="resetBtn" type="button">重設</button>
          </div>
          <details class="sync-panel">
            <summary>同步與備份</summary>
            <div class="cloud-fields">
              <label class="field">
                Apps Script URL
                <input id="scriptUrlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
              </label>
              <label class="field">
                同步代號
                <input id="syncUserInput" type="text" autocomplete="username" placeholder="例如 my-chemistry" />
              </label>
              <label class="field">
                裝置名稱
                <input id="deviceLabelInput" type="text" placeholder="例如 iPhone / Windows" />
              </label>
            </div>
            <div class="sync-actions">
              <button id="saveSyncSettingsBtn" type="button">儲存同步設定</button>
              <button id="pushCloudBtn" type="button">上傳雲端</button>
              <button id="pullCloudBtn" type="button">從雲端取回</button>
              <button id="exportStateBtn" type="button">匯出狀態</button>
              <label class="import-btn">
                匯入狀態
                <input id="importStateInput" type="file" accept="application/json,.json" />
              </label>
              <span id="syncStatus">狀態保存在此裝置</span>
            </div>
          </details>
        </section>

        <section class="question-card" aria-live="polite">
          <div class="question-head">
            <div>
              <p id="metaLine" class="eyebrow">請先選擇出題範圍</p>
              <h2 id="questionTitle">尚未開始</h2>
            </div>
            <button id="wrongBtn" class="mark-btn" type="button" aria-pressed="false">加入錯題</button>
          </div>

          <div class="image-frame">
            <img id="questionImage" alt="完整題圖" />
            <p id="imageFallback">按「開始出題」後顯示題目。</p>
          </div>

          <div class="answer-area">
            <div id="choiceButtons" class="choices" role="group" aria-label="作答選項"></div>
            <div class="answer-tools">
              <button id="showAnswerBtn" type="button">顯示答案</button>
              <p id="answerResult" class="answer-result">尚未作答</p>
            </div>
          </div>

          <details class="details-panel">
            <summary>答案與來源</summary>
            <dl>
              <div>
                <dt>答案</dt>
                <dd id="answerValue">-</dd>
              </div>
              <div>
                <dt>答案來源</dt>
                <dd id="answerSource">-</dd>
              </div>
              <div>
                <dt>官方釋疑</dt>
                <dd id="clarification">-</dd>
              </div>
              <div>
                <dt>阿摩狀態</dt>
                <dd id="amoStatus">-</dd>
              </div>
              <div>
                <dt>審圖狀態</dt>
                <dd id="reviewStatus">-</dd>
              </div>
            </dl>
          </details>
        </section>
      </section>

      <aside class="side-panel" aria-label="練習清單">
        <div class="stats">
          <div>
            <span id="progressText">0 / 0</span>
            <small>進度</small>
          </div>
          <div>
            <span id="correctText">0</span>
            <small>答對</small>
          </div>
          <div>
            <span id="wrongText">0</span>
            <small>錯題</small>
          </div>
        </div>
        <div id="questionList" class="question-list" aria-label="本次題目"></div>
      </aside>
    </main>

    <nav class="bottom-nav" aria-label="題目導覽">
      <button id="prevBtn" type="button">上一題</button>
      <button id="nextBtn" class="primary" type="button">下一題</button>
    </nav>

    <script src="./app.js"></script>
  </body>
</html>
